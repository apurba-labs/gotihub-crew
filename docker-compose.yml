services:
  # 1. Enterprise FastAPI Engine (Orchestrating Security, Planner, & Action Loop)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crew-backend-api
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://global-ollama-core:11434
      - OLLAMA_URL=http://global-ollama-core:11434
      - WORKER_MODEL=gemma3:1b
      - MASTER_MODEL=hermes3:3b
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_URL=sqlite:////app/data/gotihub_crew.db
      - ENV=production
    # ⚡ OVERRIDE IMAGE HEALTHCHECK: Uses native bash/sh routing to check if port 8000 is listening
    healthcheck:
      test: ["CMD-SHELL", "sh -c '</dev/tcp/127.0.0.1/8000'"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - gotihub_network
      - ai_shared_backbone

  # 2. Slick Production Nginx Server (Serving static agent dashboards & proxying API)
  frontend:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    container_name: crew-frontend-web
    ports:
      - "8082:80"
    depends_on:
      - backend
    restart: always
    networks:
      - gotihub_network

# ⚡ GLOBAL CHANNELS MATRIX
networks:
  gotihub_network:
    name: gotihub_global_network
    external: true
  ai_shared_backbone:
    external: true
