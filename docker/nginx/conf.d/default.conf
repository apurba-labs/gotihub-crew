server {
    listen 80;
    server_name crew.gotihub.com localhost; # ⚡ Explicitly match the subdomain here
    server_tokens off;

    # Setup explicit logging paths for easier platform debugging
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # Frontend Static Assets Delivery
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Gateway Reverse Proxy
    location /api/ {
        # Targets the internal container port (8000) within the shared docker network matrix
        proxy_pass http://crew-backend-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}